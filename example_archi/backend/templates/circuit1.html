<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Course Toto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> />
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #gameCanvas {
            background-color: rgb(41, 196, 41);
            display: block;
            margin: 20px auto;
            border: 2px solid rgb(12, 14, 12);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
       
        
    </style>
</head>

<div id="raceResults" class="results-overlay" style="display:none;">
    <div class="results-window">
        <h2>🏁 Course terminée</h2>
        <p id="finalTime"></p>
        <p id="finalLaps"></p>

        <h3>📜 Scores précédents</h3>
        <ul id="scoreList"></ul>

        <div class="buttons">
            <button id="retryBtn">Rejouer</button>
            <button id="menuBtn">Retour au menu</button>
        </div>
    </div>
</div>

<body>
    <h1>Course Toto</h1>
    <canvas id="gameCanvas" width="1500" height="600"></canvas>
    
    <canvas id="collisionCanvas" width="1500" height="600" style="display:none;"></canvas>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
